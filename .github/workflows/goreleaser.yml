name: Publish Build Artifacts

on:
  push:

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Go Toolchain
        uses: wow-look-at-my/go-toolchain@v1
        with:
          autorelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
